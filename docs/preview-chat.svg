<svg xmlns="http://www.w3.org/2000/svg" width="820" height="460" viewBox="0 0 820 460" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#17141f"/><stop offset="1" stop-color="#0e0c14"/>
    </linearGradient>
    <clipPath id="round"><rect width="820" height="460" rx="14"/></clipPath>
  </defs>
  <g clip-path="url(#round)">
    <rect width="820" height="460" fill="url(#bg)"/>

    <!-- tab bar -->
    <rect width="820" height="40" fill="#1e1a29"/>
    <circle cx="20" cy="20" r="5" fill="#3ac07a"/>
    <rect x="36" y="8" width="150" height="24" rx="6" fill="#2a2438"/>
    <text x="52" y="24" fill="#e7e2f0" font-size="13">🟢 bobik_stream</text>
    <rect x="196" y="8" width="120" height="24" rx="6" fill="#171320"/>
    <text x="210" y="24" fill="#9a92ad" font-size="13">⚫ another_ch</text>
    <text x="770" y="24" fill="#9a92ad" font-size="15">✉ 🔔 ⚙</text>

    <!-- pane header -->
    <rect y="40" width="560" height="30" fill="#191524"/>
    <text x="16" y="60" fill="#cbb6ff" font-size="13" font-weight="700">bobik_stream</text>
    <rect x="118" y="46" width="42" height="18" rx="4" fill="#c0392b"/>
    <text x="126" y="59" fill="#fff" font-size="11" font-weight="700">LIVE</text>
    <text x="185" y="59" fill="#8f88a3" font-size="11">👁 1 234 · ⏱ 2h 14m · Готуємось до ранкеду</text>

    <!-- mod toolbar -->
    <rect y="70" width="560" height="30" fill="#151120"/>
    <g font-size="11" fill="#d6d0e4">
