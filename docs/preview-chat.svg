      <rect x="84" y="76" width="86" height="18" rx="4" fill="#2a2438"/><text x="92" y="89">📣 Оголош.</text>
      <rect x="176" y="76" width="70" height="18" rx="4" fill="#2a2438"/><text x="184" y="89">⏱ Режими</text>
    </g>

    <!-- chat messages -->
    <g font-size="14">
      <text x="16" y="128"><tspan fill="#ff6fb5" font-weight="700">Bobik069</tspan><tspan fill="#cfc8dd">: привіт усім, погнали 💜</tspan></text>
      <text x="16" y="158"><tspan fill="#59a9ff" font-weight="700">Bobik069</tspan><tspan fill="#cfc8dd">: цей клятч був неймовірний</tspan></text>
      <rect x="8" y="170" width="544" height="26" rx="6" fill="#241a2e"/>
      <text x="16" y="188"><tspan fill="#a970ff" font-weight="700">🔴 Bobik069</tspan><tspan fill="#a970ff" font-weight="600"> Виділити повідомлення</tspan><tspan fill="#8f88a3"> · 500</tspan></text>
      <text x="16" y="218"><tspan fill="#8bd450" font-weight="700">Bobik069</tspan><tspan fill="#cfc8dd">: </tspan><tspan fill="#cfc8dd">Kappa</tspan><tspan fill="#cfc8dd"> так тримати!</tspan></text>
      <text x="16" y="248"><tspan fill="#f0a500" font-weight="700">Bobik069</tspan><tspan fill="#cfc8dd">: коли наступний стрім?</tspan></text>
      <text x="16" y="278"><tspan fill="#ff6fb5" font-weight="700">Bobik069</tspan><tspan fill="#cfc8dd">: GG PogChamp 🎉</tspan></text>
      <!-- hover mod buttons on a row -->
      <rect x="470" y="228" width="82" height="20" rx="6" fill="#2a2438" stroke="#3a3350"/>
      <text x="480" y="242" font-size="11" fill="#d6d0e4">⏱ 🔨 🗑 ↩</text>
    </g>

    <!-- input -->
    <rect y="410" width="560" height="50" fill="#191524"/>
    <rect x="12" y="420" width="470" height="30" rx="8" fill="#0f0c17" stroke="#33304a"/>
    <text x="24" y="440" fill="#6f6885" font-size="13">Написати повідомлення…</text>
    <rect x="490" y="420" width="58" height="30" rx="8" fill="#7a5cff"/>
    <text x="502" y="440" fill="#fff" font-size="13" font-weight="700">Send</text>

    <!-- highlights sidebar -->
    <rect x="560" y="40" width="260" height="420" fill="#141020"/>
    <g font-size="12">
      <rect x="572" y="52" width="76" height="22" rx="6" fill="#7a5cff"/><text x="584" y="67" fill="#fff">Виділені</text>
      <text x="660" y="67" fill="#9a92ad">Звернення</text>
      <text x="748" y="67" fill="#9a92ad">Редімки</text>
