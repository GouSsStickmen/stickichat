    <g font-size="12.5">
      <rect x="568" y="86" width="244" height="34" rx="6" fill="#1c1730"/>
      <text x="578" y="100"><tspan fill="#59a9ff" font-weight="700">Bobik069</tspan></text>
      <text x="578" y="114" fill="#b7b0c8">згадав тебе: @you красава</text>

      <rect x="568" y="126" width="244" height="34" rx="6" fill="#1c1730"/>
      <text x="578" y="140"><tspan fill="#a970ff" font-weight="700">🔴 Bobik069</tspan></text>
      <text x="578" y="154" fill="#b7b0c8">Виділити повідомлення · 500</text>

      <rect x="568" y="166" width="244" height="34" rx="6" fill="#1c1730"/>
      <text x="578" y="180"><tspan fill="#8bd450" font-weight="700">Bobik069</tspan></text>
      <text x="578" y="194" fill="#b7b0c8">Kappa так тримати!</text>
