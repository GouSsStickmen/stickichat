appId: com.stickmen.stickichat
productName: StickiChat
directories:
  output: release
files:
  - out/**
  - package.json
win:
  target: nsis
  icon: build/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
publish:
  provider: github
  owner: GouSsStickmen
  repo: stickichat
  releaseType: release
# Shown in the in-app "update available" popup (electron-updater reads the GitHub release
# body). Update this list every release — items only, no service/signature footer line.
releaseInfo:
  releaseNotes: |
    StickiChat 0.5.3 — що нового:

    • Оверлей: «Режим редагування» (бета) — повідомлення-шаблон редагується мишкою: тягни нік, бейджі, аватарку, час чи текст; колесо — масштаб; Alt+колесо — поворот ніка; Ctrl+Z / Ctrl+Shift+Z; Ctrl+ПКМ — переміщення по вікну
    • Оверлей: зум і переміщення прев’ю (колесо до курсора, перетягування, подвійний клік — скидання)
    • Оверлей: справжні «Титри» — повідомлення безперервно пливуть угору з налаштовуваною швидкістю; старий режим лишився як «Плавна прокрутка»
    • Оверлей: фільтр бейджів (Стример/Модератор/VIP/Саби/Засновники/Глобальні) + заміна будь-якого бейджа своєю картинкою — аж до конкретного варіанта предікшину, і персональні бейджі конкретним глядачам
    • Емодзі: єдиний стиль Apple (як у Telegram) скрізь — чат, підказки, пікер, оверлей; однакова ширина, жодних розвалених пар
    • Панель «Виділені»: нова вкладка «Сабки»; згадки/слова/редімки/сабки записуються навіть із закритою панеллю
    • Спільний чат: повідомлення з чужого каналу підсвічуються, поруч аватарка стримера, з чийого чату пише користувач
    • Помилки: людською мовою, з назвою акаунта; сповіщення висить 10с і закривається кліком
    • Чат: автопрокрутка більше не зупиняється, коли вікно у фоні
    • Посилання: «🔗 коротко» можна лише для оверлея; прев’ю лише для Twitch-кліпів; масштаб карток прев’ю
    • Емоути 7TV: великі канали більше не вантажаться хвилинами
    • Онбординг: «Почати спілкування» без акаунта (режим читання); зрозуміліші підказки
    • Редактор оверлея: Ctrl+Z/повтор, кути плашки сіткою 2×2, ручний ввід у перспективі, /me кольором користувача
    • Акаунт біля інпуту: повний нік або лише аватарка; стрик-вогник: сірий/кольоровий, число по кліку
    • Дрібне: воронка у фільтрі вкладок, підказка при додаванні каналу, поле Client ID прибрано з налаштувань
