appId: com.stickmen.stickichat
productName: StickiChat
directories:
  output: release
files:
  - out/**
  - package.json
win:
  target: nsis
  icon: build/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
publish:
  provider: github
  owner: GouSsStickmen
  repo: stickichat
  releaseType: release
# Shown in the in-app "update available" popup (electron-updater reads the GitHub release
# body). Update this list every release — items only, no service/signature footer line.
releaseInfo:
  releaseNotes: |
    StickiChat 0.5.5 — що нового:

    • Власна піпетка кольору: повноекранна лупа поверх усіх вікон, працює на всіх моніторах (виправлено чорні монітори й пропуск третього), без білого спалаху
    • Емодзі: додано найновіші (Unicode 16 — 🫩 🫆 🫜 🪉 🪏 …) через запасний набір Google; тепер вони є в пікері, підказках та інпуті
    • Пікер емоутів/емодзі: плавна прокрутка без смикань, швидше вантажаться великі 7TV-канали
    • Плавна прокрутка чату (як у Chatterino) — окремий перемикач у Налаштування → Чат
    • Клік по реплай-повідомленню більше не скидає чат донизу — зупиняється на оригіналі
    • Редактор оверлея: верхня панель більше не ховає кнопки при вузькому вікні
    • Виправлено дубль редімків із текстом, редагування колірних значень і дрібниці
    • Помилки з назвою акаунта, висять довше й закриваються кліком; 7TV-кольори ніків за замовчуванням
    • Оверлей: фільтр і заміна бейджів (+ персональні); режим титрів із керуванням висотою/швидкістю/кількістю та прискоренням при спамі
    • Юзеркард окремим вікном зберігає історію; вогник стрику ближче до інпуту; лічильник символів із сейв-зоною
