appId: com.stickmen.stickichat
productName: StickiChat
directories:
  output: release
files:
  - out/**
  - package.json
win:
  target: nsis
  icon: build/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
publish:
  provider: github
  owner: GouSsStickmen
  repo: stickichat
  releaseType: release
# Shown in the in-app "update available" popup (electron-updater reads the GitHub release
# body). Update this list every release — items only, no service/signature footer line.
releaseInfo:
  releaseNotes: |
    StickiChat 0.5.2 — що нового:

    • Оверлей: окрема тривалість анімації появи та зникнення; для всіх напрямкових анімацій — вибір напряму (звідки з’являється / куди зникає)
    • Оверлей: +10 нових анімацій (Swing, Drop, Roll, Spin, Stretch, Glitch, Flash, Rise, Slam, Rubber, Wobble, Fold, Skew, Neon, Tilt, Typewriter, Hinge) і повноцінні анімації зникнення повідомлень
    • Оверлей: плавна прокрутка «як титри» — нові повідомлення плавно підштовхують чат замість стрибка
    • Оверлей: повний імпорт/експорт оверлеїв — можна обмінюватися власними дизайнами
    • Оверлей: два нові пресети — «Windows» (синтвейв-вікно) і «Аркуш» (текстурний папір із рукописним текстом)
    • Оверлей: вибір каналу прямо на картці менеджера — без відкриття редактора
    • Оверлей: перспектива більше не обрізає чат — навіть при повороті на 90° він вписується в кадр
    • Оверлей: при «вільному ніку над плашкою» плашка не вужча за нік
    • Оверлей: тригер-реакція може містити кілька слів / фраз / ніків (кожне з нового рядка)
    • Прев’ю посилань у чаті: назва й зображення сторінки; для Twitch-кліпів — назва кліпа та прев’ю; перемикач «повний URL / коротко»
    • Сповіщення в чаті про початок голосування або предікту
    • Стрик перегляду: показ у картці користувача + власний стрик біля поля вводу
    • Новий вибір кольору: власна палітра (відтінок/насиченість + hex), піпетка через увесь екран, спливне вікно не ховається за краєм
    • Акаунти: пріоритет (порядок) тепер зберігається між відкриттями налаштувань
    • Чат: перше повідомлення після довгої паузи більше не губиться, прибрано інпут-лаг; пробіл перед «/» надсилає це як текст
    • Підсвітка ніків: можна вписувати нік у будь-якому регістрі; ПКМ по ніку вставляє його зі збереженням регістру
    • Приховані користувачі: коми й пробіли більше не «з’їдаються» під час набору
