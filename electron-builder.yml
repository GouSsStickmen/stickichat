appId: com.stickmen.stickichat
productName: StickiChat
directories:
  output: release
files:
  - out/**
  - package.json
win:
  target: nsis
  icon: build/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
publish:
  provider: github
  owner: GouSsStickmen
  repo: stickichat
  releaseType: release
# Shown in the in-app "update available" popup (electron-updater reads the GitHub release
# body). Update this list every release — items only, no service/signature footer line.
releaseInfo:
  releaseNotes: |
    StickiChat 0.5.6 — що нового:

    • Оверлей: справжня друкарська машинка — текст з’являється по літері, рядок за рядком
    • Оверлей: новий режим «Перегортання сторінок» — аркуш заповнюється, а коли повний, сторінка перегортається назовні на чистий лист (напрямок будь-який)
    • Перегортання рахує ВИСОТУ, а не кількість повідомлень — довге повідомлення перегортає сторінку заздалегідь і не вилазить за край
    • Новий пресет «Блокнот»: лінований аркуш із пружиною, друкарська машинка + перегортання вліво з ефектом загину сторінки
    • Редактор оверлея: рамка в прев’ю = справжній розмір оверлея; тепер її можна тягнути за краї та кути з відповідним курсором
    • Усі числові поля можна вписувати вручну (обмеження лише при завершенні вводу)
    • Підсвітка редімків (балів каналу) тепер справді фарбує рядок у чаті
    • Відступ зони чату та перспектива тепер працюють і на «Титрах», і на «Перегортанні сторінок»
